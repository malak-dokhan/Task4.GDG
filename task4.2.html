<body>
  <h2>My Weekly Schedule</h2>
  <table border="1" cellpadding="8" style="border-collapse: collapse;">
    <caption>Weekly Schedule (Monday : Friday)</caption>
    <thead>
      <tr>
        <th>Day</th>
        <th>Activity</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Monday</td>
        <td>Gym</td>
        <td>7:00 : 8:00 AM</td>
      </tr>
      <tr>
        <td>Tuesday</td>
        <td>Team Meeting</td>
        <td>10:00 : 11:00 AM</td>
      </tr>
      <tr>
        <td>Wednesday</td>
        <td>Study Session</td>
        <td>6:00 : 8:00 PM</td>
      </tr>
      <tr>
        <td>Thursday</td>
        <td>Yoga Class</td>
        <td>9:00 : 10:00 AM</td>
      </tr>
      <tr>
        <td>Friday</td>
        <td>Project Work</td>
        <td>2:00 : 5:00 PM</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
